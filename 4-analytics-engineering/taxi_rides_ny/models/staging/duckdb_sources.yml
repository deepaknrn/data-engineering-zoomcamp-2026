version: 2

sources:
  - name: duckdb_raw_data
    description: "This source contains the raw data for the taxi rides in New York City."
    database : taxi_rides_ny
    schema: prod
    tables:
      - name: yellow_tripdata
        freshness : #default freshness
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
        loaded_at_field: tpep_pickup_datetime
        description: "This table contains the yellow taxi trip data for New York City for the years 2019 and 2020. taxi_rides_ny.prod.yellow_tripdata"
      - name: green_tripdata
        description: "This table contains the green taxi trip data for New York City for the years 2019 and 2020. taxi_rides_ny.prod.green_tripdata"
        freshness : #default freshness
          warn_after: {count: 12, period: hour}
          error_after: {count: 24, period: hour}
        loaded_at_field: lpep_pickup_datetime