id: 07_gcp_setup
namespace: zoomcamp


#gcs.CreateBucket plugin is used to create a new bucket in Google Cloud Storage (GCS). In this workflow, it is configured to create a bucket with the name specified in the KV store under the key GCP_BUCKET_NAME. The storage class is set to REGIONAL, which means that the data will be stored in a specific region and will have lower latency for access within that region. The ifExists parameter is set to SKIP, which means that if a bucket with the same name already exists, the task will be skipped without throwing an error. This allows for idempotent execution of the workflow, ensuring that it can be run multiple times without causing issues due to existing resources.
tasks:
  - id: create_gcs_bucket
    type: io.kestra.plugin.gcp.gcs.CreateBucket
    ifExists: SKIP
    storageClass: REGIONAL
    name: "{{kv('GCP_BUCKET_NAME')}}" # make sure it's globally unique!


#bigquery.CreateDataset is used to create a new dataset in Google BigQuery. In this workflow, it is configured to create a dataset with the name specified in the KV store under the key GCP_DATASET. The ifExists parameter is set to SKIP, which means that if a dataset with the same name already exists, the task will be skipped without throwing an error. This allows for idempotent execution of the workflow, ensuring that it can be run multiple times without causing issues due to existing resources. The dataset will be created in the project and location specified in the pluginDefaults section, which centralizes the configuration for GCP resources.
  - id: create_bq_dataset
    type: io.kestra.plugin.gcp.bigquery.CreateDataset
    name: "{{kv('GCP_DATASET')}}"
    ifExists: SKIP


#The GCP_SERVICE_ACCOUNT is passed on as a secret to the workflow, from the docker-compose.yaml file while starting the docker image for Kestra.
#The Secrets are base64 encoded in the .env_encoded file, and they are decoded and passed to the workflow as environment variables. In this case, the GCP_SERVICE_ACCOUNT secret contains the service account key in JSON format, which is required for authenticating with GCP services. By using secrets, we can securely manage sensitive information and avoid hardcoding credentials directly in the workflow code. The service account key will be used by the GCP plugins in the workflow to authenticate API requests to GCP services such as GCS and BigQuery.

pluginDefaults:
  - type: io.kestra.plugin.gcp
    values:
      serviceAccount: "{{secret('GCP_SERVICE_ACCOUNT')}}"
      projectId: "{{kv('GCP_PROJECT_ID')}}"
      location: "{{kv('GCP_LOCATION')}}"
      bucket: "{{kv('GCP_BUCKET_NAME')}}"